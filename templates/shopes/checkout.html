<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ชำระเงิน — Shopes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #ee4d2d;
            --primary-hover: #d63d1f;
            --yellow: #ffbc00;
            --bg: #f5f5f5;
            --white: #fff;
            --text: #222;
            --text-secondary: #777;
            --border: #e8e8e8;
            --shadow: 0 1px 2px 0 rgba(0,0,0,.1);
            --radius: 8px;
        }
        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .header {
            background: linear-gradient(-180deg, #f53d2d, #f63);
            box-shadow: 0 1px 4px rgba(0,0,0,.15);
        }
        .header-inner {
            max-width: 1200px; margin: 0 auto;
            padding: 0.8rem 1.5rem;
            display: flex; align-items: center;
        }
        .logo {
            font-size: 1.5rem; font-weight: 700; color: #fff;
            text-decoration: none; letter-spacing: -0.5px;
        }
        .logo span { color: var(--yellow); }

        .container {
            max-width: 900px; margin: 0 auto;
            padding: 1.5rem;
        }

        .page-title {
            font-size: 1.3rem; font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .checkout-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1.5rem;
        }
        .card h2 {
            font-size: 1.05rem; font-weight: 600;
            margin-bottom: 1rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid var(--border);
        }

        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block; font-size: 0.9rem;
            font-weight: 500; margin-bottom: 0.3rem;
            color: var(--text-secondary);
        }
        .form-group input,
        .form-group textarea {
            width: 100%; padding: 0.7rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 4px; font-size: 0.95rem;
            font-family: inherit; transition: border-color 0.2s;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none; border-color: var(--primary);
        }
        .form-group textarea {
            min-height: 80px; resize: vertical;
        }

        .order-summary-item {
            display: flex; justify-content: space-between;
            padding: 0.6rem 0;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--border);
        }
        .order-summary-item:last-child { border-bottom: none; }
        .order-summary-item .name {
            flex: 1; padding-right: 1rem;
        }
        .order-summary-item .qty {
            color: var(--text-secondary);
        }
        .order-summary-item .price {
            font-weight: 500;
            min-width: 80px; text-align: right;
        }
        .order-summary-item .price::before { content: '฿'; font-size: 0.75rem; }

        .order-total {
            display: flex; justify-content: space-between;
            padding-top: 1rem; margin-top: 0.5rem;
            border-top: 2px solid var(--text);
            font-size: 1.2rem; font-weight: 700;
        }
        .order-total .amount {
            color: var(--primary);
        }
        .order-total .amount::before { content: '฿'; }

        .btn-submit {
            width: 100%; padding: 0.9rem;
            background: var(--primary); color: #fff;
            border: none; border-radius: 4px;
            font-size: 1.1rem; font-weight: 600; cursor: pointer;
            margin-top: 1rem;
            transition: background 0.2s;
        }
        .btn-submit:hover { background: var(--primary-hover); }

        .error-msg {
            background: #fff0ee;
            color: var(--primary);
            padding: 0.8rem 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .checkout-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="{% url 'shopes:product_list' %}" class="logo">Shop<span>es</span></a>
        </div>
    </header>

    <div class="container">
        <h1 class="page-title">📋 ชำระเงิน</h1>

        <div class="checkout-grid">
            <div class="card">
                <h2>ที่อยู่จัดส่ง</h2>
                {% if error %}
                <div class="error-msg">{{ error }}</div>
                {% endif %}
                <form method="post" id="checkout-form">
                    {% csrf_token %}
                    <div class="form-group">
                        <label>ชื่อ-นามสกุล</label>
                        <input type="text" name="customer_name" required placeholder="กรุณากรอกชื่อ">
                    </div>
                    <div class="form-group">
                        <label>เบอร์โทรศัพท์</label>
                        <input type="tel" name="customer_phone" required placeholder="08X-XXX-XXXX">
                    </div>
                    <div class="form-group">
                        <label>ที่อยู่จัดส่ง</label>
                        <textarea name="customer_address" required placeholder="บ้านเลขที่, ถนน, แขวง/ตำบล, เขต/อำเภอ, จังหวัด, รหัสไปรษณีย์"></textarea>
                    </div>
                    <button type="submit" class="btn-submit">ยืนยันคำสั่งซื้อ</button>
                </form>
            </div>

            <div class="card">
                <h2>รายการสินค้า</h2>
                {% for item in items %}
                <div class="order-summary-item">
                    <span class="name">{{ item.product_name }}</span>
                    <span class="qty">x{{ item.quantity }}</span>
                    <span class="price">{{ item.price|floatformat:2 }}</span>
                </div>
                {% endfor %}
                <div class="order-total">
                    <span>ยอดรวม</span>
                    <span class="amount">{{ total|floatformat:2 }}</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
